<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Pro AI Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .input-field { background: #334155; border: 1px solid #475569; border-radius: 8px; color: white; padding: 10px; width: 100%; font-size: 14px; }
        .pos-btn { background: #1e293b; border: 1px solid #475569; border-radius: 6px; padding: 8px 0; text-align: center; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .pos-btn.active { background: #38bdf8; border-color: #38bdf8; color: #0f172a; font-weight: bold; }
        .pos-label { font-size: 10px; color: #64748b; font-weight: bold; margin-bottom: 4px; margin-top: 8px; display: block; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-20">

    <header class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-blue-400 italic">POKER PRO AI</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">Full Ring Edition</p>
        </div>
        <div class="text-[10px] text-emerald-400 bg-emerald-400/10 px-2 py-1 rounded border border-emerald-400/20">Cloud Ready</div>
    </header>

    <div class="glass-card">
        <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">10 人桌位置</label>
        <span class="pos-label">前期 (EP)</span>
        <div class="grid grid-cols-3 gap-2">
            <div class="pos-btn" onclick="setPos(this)">UTG</div>
            <div class="pos-btn" onclick="setPos(this)">UTG+1</div>
            <div class="pos-btn" onclick="setPos(this)">UTG+2</div>
        </div>
        <span class="pos-label">中期 (MP)</span>
        <div class="grid grid-cols-3 gap-2">
            <div class="pos-btn" onclick="setPos(this)">MP1</div>
            <div class="pos-btn" onclick="setPos(this)">LJ</div>
            <div class="pos-btn" onclick="setPos(this)">HJ</div>
        </div>
        <span class="pos-label">後期 / 盲注 (LP/Blinds)</span>
        <div class="grid grid-cols-4 gap-2">
            <div class="pos-btn" onclick="setPos(this)">CO</div>
            <div class="pos-btn" onclick="setPos(this)">BTN</div>
            <div class="pos-btn" onclick="setPos(this)">SB</div>
            <div class="pos-btn" onclick="setPos(this)">BB</div>
        </div>
    </div>

    <div class="glass-card">
        <div class="flex gap-4 mb-4">
            <div class="flex-1">
                <label class="text-xs text-slate-500 mb-1 block">我的手牌</label>
                <input type="text" id="hand" class="input-field" placeholder="例如: 88">
            </div>
            <div class="flex-1">
                <label class="text-xs text-slate-500 mb-1 block">有效深度 (bb)</label>
                <input type="number" id="stack" class="input-field" placeholder="100">
            </div>
        </div>
        <div class="mb-4">
            <label class="text-xs text-slate-500 mb-1 block">過程敘述</label>
            <textarea id="action" class="input-field" rows="2" placeholder="動作敘述..."></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-xs text-slate-500 mb-1 block">盈虧 (Profit)</label>
                <input type="number" id="profit" class="input-field" placeholder="+2500">
            </div>
            <div>
                <label class="text-xs text-slate-500 mb-1 block">心得紀錄</label>
                <input type="text" id="note" class="input-field" placeholder="備註...">
            </div>
        </div>
    </div>

    <div class="space-y-3">
        <button id="aiBtn" onclick="analyzeWithAI()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold py-3 rounded-xl transition-all active:scale-95 shadow-lg border border-purple-400/30">
            🧠 Gemini 戰略分析
        </button>
        <button id="saveBtn" onclick="saveToCloud()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all active:scale-95 shadow-lg">
            💾 儲存紀錄至雲端
        </button>
    </div>

    <div id="aiResponse" class="hidden mt-4 glass-card border-purple-500/50 bg-purple-900/10 p-4 text-sm text-purple-200">
        <div class="flex items-center mb-2">
            <span class="text-[10px] bg-purple-500 text-white px-1.5 py-0.5 rounded font-bold mr-2 tracking-widest uppercase">Coach Gemini</span>
            <div class="h-px flex-1 bg-purple-500/20"></div>
        </div>
        <p id="aiText" class="italic leading-relaxed whitespace-pre-wrap">正在讀取牌局...</p>
    </div>

    <div id="status" class="mt-4 text-center text-xs font-bold h-4"></div>
    <div id="history" class="mt-6 space-y-3"></div>

    <script>
        // ⚠️ 請填入你的 Google Apps Script 網址 ⚠️
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxystOwh-sfTCBFgGjki25IAirm_WUk_Vqkkd4fYLqGcbZsPS2jkBCRoJNUJoNF3iE8/exec';
        
        let currentPos = '';

        function setPos(el) {
            document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentPos = el.innerText;
        }

        async function analyzeWithAI() {
            if(!currentPos || !document.getElementById('hand').value) {
                alert("請填寫位置與手牌"); return;
            }
            const aiText = document.getElementById('aiText');
            const aiResponse = document.getElementById('aiResponse');
            const aiBtn = document.getElementById('aiBtn');
            
            aiResponse.classList.remove('hidden');
            aiText.innerText = "教練正在分析中...";
            aiBtn.disabled = true;

            const data = {
                type: "ANALYZE_HAND", // 關鍵指令
                pos: currentPos,
                hand: document.getElementById('hand').value,
                stack: document.getElementById('stack').value,
                action: document.getElementById('action').value,
                note: document.getElementById('note').value
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                const res = await response.json();
                aiText.innerText = res.result;
            } catch (e) {
                aiText.innerText = "AI 連線失敗，請確認雲端部署版本。";
            } finally {
                aiBtn.disabled = false;
            }
        }

        async function saveToCloud() {
            if(!currentPos) { alert("請選位置"); return; }
            const saveBtn = document.getElementById('saveBtn');
            const status = document.getElementById('status');
            
            saveBtn.innerText = "同步中...";
            document.body.classList.add('loading');

            const data = {
                type: "SAVE_HAND", // 關鍵指令
                pos: currentPos,
                hand: document.getElementById('hand').value,
                stack: document.getElementById('stack').value,
                action: document.getElementById('action').value,
                profit: document.getElementById('profit').value,
                note: document.getElementById('note').value
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                status.innerText = "✅ 已成功寫入 Google Sheets";
                status.className = "mt-4 text-center text-xs font-bold h-4 text-emerald-400";
                
                updateLocalHistory(data);
                
                document.getElementById('hand').value = '';
                document.getElementById('action').value = '';
                document.getElementById('profit').value = '';
                document.getElementById('note').value = '';
            } catch (e) {
                status.innerText = "❌ 儲存失敗";
                status.className = "mt-4 text-center text-xs font-bold h-4 text-red-400";
            } finally {
                saveBtn.innerText = "💾 儲存紀錄至雲端";
                document.body.classList.remove('loading');
                setTimeout(() => status.innerText = "", 3000);
            }
        }

        function updateLocalHistory(data) {
            let history = JSON.parse(localStorage.getItem('poker_pro_history_v2') || '[]');
            data.time = new Date().toLocaleTimeString();
            history.unshift(data);
            if(history.length > 5) history.pop();
            localStorage.setItem('poker_pro_history_v2', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('poker_pro_history_v2') || '[]');
            const container = document.getElementById('history');
            container.innerHTML = '<h2 class="text-slate-500 text-[10px] font-bold mb-3 uppercase text-center">Recent Logs</h2>';
            history.forEach(h => {
                const win = parseFloat(h.profit) >= 0;
                container.innerHTML += `
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700 text-sm">
                        <div class="flex justify-between mb-1">
                            <span class="text-blue-400 font-bold">${h.pos} | ${h.hand}</span>
                            <span class="${win ? 'text-emerald-400' : 'text-red-400'} font-mono">${h.profit || 0}</span>
                        </div>
                        <div class="text-[10px] text-slate-500 leading-tight">${h.action}</div>
                    </div>
                `;
            });
        }
        window.onload = renderHistory;
    </script>
</body>
</html>
