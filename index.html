<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Full Ring Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .input-field { background: #334155; border: 1px solid #475569; border-radius: 8px; color: white; padding: 10px; width: 100%; font-size: 14px; }
        .pos-btn { background: #1e293b; border: 1px solid #475569; border-radius: 6px; padding: 8px 0; text-align: center; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .pos-btn.active { background: #38bdf8; border-color: #38bdf8; color: #0f172a; font-weight: bold; }
        .pos-label { font-size: 10px; color: #64748b; font-weight: bold; margin-bottom: 4px; margin-top: 8px; display: block; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-20">

    <header class="mb-6">
        <h1 class="text-xl font-black text-blue-400">FULL RING 戰筆記</h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest">10-Max Table Intelligence</p>
    </header>

    <div class="glass-card">
        <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">10 人桌位置選擇</label>
        
        <span class="pos-label">前期位 (EP)</span>
        <div class="grid grid-cols-3 gap-2">
            <div class="pos-btn" onclick="setPos(this)">UTG</div>
            <div class="pos-btn" onclick="setPos(this)">UTG+1</div>
            <div class="pos-btn" onclick="setPos(this)">UTG+2</div>
        </div>

        <span class="pos-label">中期位 (MP)</span>
        <div class="grid grid-cols-3 gap-2">
            <div class="pos-btn" onclick="setPos(this)">MP1</div>
            <div class="pos-btn" onclick="setPos(this)">LJ</div>
            <div class="pos-btn" onclick="setPos(this)">HJ</div>
        </div>

        <span class="pos-label">後期位與盲注 (LP / Blinds)</span>
        <div class="grid grid-cols-4 gap-2">
            <div class="pos-btn" onclick="setPos(this)">CO</div>
            <div class="pos-btn" onclick="setPos(this)">BTN</div>
            <div class="pos-btn" onclick="setPos(this)">SB</div>
            <div class="pos-btn" onclick="setPos(this)">BB</div>
        </div>
    </div>

    <!-- 核心數據 -->
    <div class="glass-card">
        <div class="flex gap-4 mb-4">
            <div class="flex-1">
                <label class="text-xs text-slate-500 mb-1 block">我的手牌</label>
                <input type="text" id="hand" class="input-field" placeholder="例如: 88">
            </div>
            <div class="flex-1">
                <label class="text-xs text-slate-500 mb-1 block">有效籌碼 (bb)</label>
                <input type="number" id="stack" class="input-field" placeholder="100">
            </div>
        </div>
        
        <div class="mb-4">
            <label class="text-xs text-slate-500 mb-1 block">過程敘述</label>
            <textarea id="action" class="input-field" rows="2" placeholder="UTG Open, I Call..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-xs text-slate-500 mb-1 block">盈虧 (Profit)</label>
                <input type="number" id="profit" class="input-field" placeholder="+2500">
            </div>
            <div>
                <label class="text-xs text-slate-500 mb-1 block">檢討備註</label>
                <input type="text" id="note" class="input-field" placeholder="太衝動了...">
            </div>
        </div>
    </div>

    <button onclick="saveHand()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg">
        儲存紀錄
    </button>

    <div id="history" class="mt-8 space-y-3"></div>

    <script>
        let currentPos = '';

        function setPos(el) {
            document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentPos = el.innerText;
        }

        function saveHand() {
            const data = {
                id: Date.now(),
                pos: currentPos,
                hand: document.getElementById('hand').value,
                stack: document.getElementById('stack').value,
                action: document.getElementById('action').value,
                profit: document.getElementById('profit').value,
                note: document.getElementById('note').value,
                time: new Date().toLocaleString()
            };
            let history = JSON.parse(localStorage.getItem('poker_10max') || '[]');
            history.unshift(data);
            localStorage.setItem('poker_10max', JSON.stringify(history));
            renderHistory();
            
            // 清除輸入
            document.getElementById('hand').value = '';
            document.getElementById('action').value = '';
            document.getElementById('profit').value = '';
            document.getElementById('note').value = '';
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('poker_10max') || '[]');
            const container = document.getElementById('history');
            container.innerHTML = '<h2 class="text-slate-500 text-[10px] font-bold mb-3 uppercase tracking-tighter">History</h2>';
            history.forEach(h => {
                const win = parseFloat(h.profit) >= 0;
                container.innerHTML += `
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700 text-sm">
                        <div class="flex justify-between mb-1">
                            <span class="text-blue-400 font-bold">${h.pos} | ${h.hand}</span>
                            <span class="${win ? 'text-emerald-400' : 'text-red-400'} font-mono">${h.profit}</span>
                        </div>
                        <div class="text-[11px] text-slate-400 leading-tight">${h.action}</div>
                        <div class="text-[10px] text-slate-500 mt-2 italic">Note: ${h.note}</div>
                    </div>
                `;
            });
        }
        window.onload = renderHistory;
    </script>
</body>
</html>
